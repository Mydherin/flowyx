spring:
  application:
    name: spring-boot-java-25-scaffolding

  datasource:
    url: jdbc:postgresql://localhost:5432/spring_boot_java_25
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItZmxvd3l4LWRldi1vbmx5LTI1NmJpdHM=}
    expiration-ms: 900000
  refresh-token:
    expiration-days: 30
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/callback/google}
    token-endpoint: https://oauth2.googleapis.com/token
    userinfo-endpoint: https://www.googleapis.com/oauth2/v2/userinfo
    auth-endpoint: https://accounts.google.com/o/oauth2/v2/auth
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
