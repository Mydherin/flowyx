<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Flowyx</title>

    <!-- PWA manifest (drives standalone mode on both iOS and Android) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS Safari: standalone mode + translucent status bar -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flowyx" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Android Chrome: standalone mode + status bar color -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
