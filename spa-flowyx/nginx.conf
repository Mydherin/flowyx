# Upload size limit — applies to all requests including /api video uploads
client_max_body_size 500M;

server {
    listen 80;
    server_name flowyx.skypea.dev;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # ── Proxy: /api/* → mic-flowyx backend ──────────────────
    # Vite: { '/api': { target: 'http://localhost:8080', changeOrigin: true } }
    # Path is preserved — /api/v1/videos reaches upstream as /api/v1/videos.
    # proxy_pass with NO trailing slash is critical to preserve the prefix.
    location /api/ {
        proxy_pass         http://mic-flowyx:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout  60s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
        proxy_buffering        off;
    }

    # ── Proxy: /media/* → MinIO (with path rewrite) ─────────
    # Vite: rewrite (path) => path.replace(/^\/media/, '/flowyx-videos')
    # Nginx strips the /media/ prefix and prepends /flowyx-videos/ via
    # the trailing slash on proxy_pass — no regex or $1 needed.
    # /media/video.mp4 → http://minio:9000/flowyx-videos/video.mp4
    location ^~ /media/ {
        proxy_pass         http://minio:9000/flowyx-videos/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    # ── Static assets: aggressive caching ───────────────────
    # Vite outputs content-hashed filenames — safe to cache immutably.
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── SPA fallback: React Router ───────────────────────────
    # Any path not matching a real file gets index.html
    # so client-side routing works on direct URL access / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
